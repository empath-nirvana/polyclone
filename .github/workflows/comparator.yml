name: Comparator judge
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['comparator/**', 'PolyClone/**', 'PolyClone.lean', 'lakefile.toml', 'lean-toolchain', '.github/workflows/comparator.yml']

jobs:
  judge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSfL https://github.com/leanprover/elan/releases/latest/download/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Build solution and challenge
        run: |
          lake exe cache get
          lake build PolyClone Challenge

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build landrun
        run: |
          git clone --depth 1 https://github.com/Zouuup/landrun
          cd landrun
          go build -o landrun ./cmd/landrun 2>/dev/null || go build -o landrun .
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Build nanoda
        run: |
          git clone --depth 1 https://github.com/ammkrn/nanoda_lib
          cd nanoda_lib
          cargo build --release
          echo "$PWD/target/release" >> "$GITHUB_PATH"

      - name: Build comparator (with lean4export)
        run: |
          git clone --depth 1 https://github.com/leanprover/comparator ../comparator-tool
          # Build the judge with THIS PROJECT's toolchain so the lean4export
          # binary it spawns can read our .olean files.
          #
          # NOTE: do NOT run `lake update` here. Lake's "toolchain uplift"
          # silently rewrites ../comparator-tool/lean-toolchain to the
          # dependency's newer toolchain (lean4export master is on
          # v4.31.0-rc2) and restarts via elan, so comparator + lean4export
          # get built with v4.31.0-rc2 and then reject our v4.30.0-rc2
          # oleans with "incompatible header". The pinned revs in
          # comparator's lake-manifest.json build fine as-is.
          cp lean-toolchain ../comparator-tool/lean-toolchain
          cd ../comparator-tool
          lake build lean4export comparator
          # Fail fast if anything bumped the judge's toolchain behind our back.
          cmp lean-toolchain "$GITHUB_WORKSPACE/lean-toolchain"
          echo "COMPARATOR_BIN=$(find . -type f -name comparator -path '*/bin/*' | head -1 | xargs realpath)" >> "$GITHUB_ENV"
          L4E=$(find . .lake -type f -name lean4export -path '*/bin/*' 2>/dev/null | head -1)
          if [ -n "$L4E" ]; then echo "COMPARATOR_LEAN4EXPORT=$(realpath "$L4E")" >> "$GITHUB_ENV"; fi

      - name: Prepare judge config
        run: |
          # comparator's "definition holes" only support `def`s: it errors with
          # "Challenge constant is not a definition" on anything else
          # (Comparator/Compare.lean, `let .defnInfo ... | throw`).
          # PolyClone.CloAddMul.Clo is an `inductive`, so it cannot be a hole.
          # Dropping it from definition_names does NOT weaken the judgment:
          # Clo is reachable from every theorem statement, so the comparator's
          # dependency crawl compares it FULLY (structurally) between challenge
          # and solution instead of signature-only. comparator/config.json
          # itself is left untouched.
          jq '.definition_names |= map(select(. != "PolyClone.CloAddMul.Clo"))' \
            comparator/config.json > "$RUNNER_TEMP/judge-config.json"
          cat "$RUNNER_TEMP/judge-config.json"

      - name: Run judge
        run: |
          which landrun nanoda_bin || true
          echo "lean4export: $COMPARATOR_LEAN4EXPORT"
          lake env "$COMPARATOR_BIN" "$RUNNER_TEMP/judge-config.json"
