name: CI
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
      - name: Build challenge module (statements-only spec)
        run: lake build Challenge
      - name: Axiom audit (main results use only standard axioms)
        run: |
          lake env lean scripts/AxiomCheck.lean | tee axioms.out
          diff axioms.out scripts/axioms.expected
